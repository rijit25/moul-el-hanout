<!DOCTYPE html>
<html lang="en" class="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Moul El Hanout - مول الحانوت</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython_stdlib.js"></script>
</head>
<body onload="brython()">

  <!-- Language Selection Screen -->
  <div id="lang-screen" class="screen">
    <h1>Moul El Hanout <br> مول الحانوت</h1>
    <p>Choose your language / اختر لغتك</p>
    <button class="menu-btn" id="btn-ar">العربية 🇲🇦</button>
    <button class="menu-btn" id="btn-fr">Français 🇫🇷</button>
  </div>

  <!-- Main Menu -->
  <div id="main-menu" class="screen hidden">
    <h1 id="t-title">Moul El Hanout</h1>
    <button class="menu-btn" id="btn-start" data-t="start_game">Start Game</button>
    <button class="menu-btn" id="btn-continue" data-t="continue">Continue</button>
    <button class="menu-btn" id="btn-about" data-t="about">About</button>
    <p id="t-credits" data-t="created_by" style="margin-top:20px; color:#555;"></p>
  </div>

  <!-- Game Interface -->
  <div id="game-ui" class="screen hidden" style="background: transparent;">
    
    <!-- Heads Up Display -->
    <div id="hud">
      <div id="hud-money">Money: 0 dh</div>
      <div id="hud-day">Day: 1</div>
      <div class="hud-buttons">
        <button id="btn-stock" data-t="buy_stock">Stock</button>
        <button id="btn-upgrades" data-t="upgrades">Upgrades</button>
        <button id="btn-menu" data-t="settings">Menu</button>
      </div>
    </div>

    <!-- Gameplay Area -->
    <div id="game-container">
      <div class="shop-shelves" id="shelves">
        <!-- Products generated by Python -->
      </div>
      <div id="customer-area">
        <!-- Customers generated by Python -->
      </div>
    </div>

  </div>

  <!-- Modal Template -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2 id="modal-title">Title</h2>
      <p id="modal-text">Text</p>
      <input type="number" id="modal-input" class="hidden" autocomplete="off">
      <div id="modal-buttons">
        <!-- Buttons injected here -->
      </div>
    </div>
  </div>

  <!-- Notifications container -->
  <div id="notifications"></div>

  <!-- Core Python Script -->
  <script type="text/python" src="main.py"></script>

</body>
</html>
